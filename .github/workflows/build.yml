name: Build

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@4

    - name: Go enviroment
      uses: actions/setup-go@5
      with:
        go-version: '1.24.0'
        cache: true

    - name: build
      run: make

    - name: upload
      uses: actions/upload-artifact@v4
      with:
        name: out
        path: build/friend
